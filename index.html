function _nullishCoalesce(lhs, rhsFn) { if (lhs != null) { return lhs; } else { return rhsFn(); } } function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }

/* ============================================================
   STORAGE LAYER — Firebase Realtime Database
   Same dbGet/dbSet interface as before + live subscriptions.
   Falls back to localStorage if Firebase isn't configured yet.
   ============================================================ */
let FB_DB=null, FB_OK=false;
function initFirebase(){
  try{
    if(typeof firebase!=="undefined" && window.FIREBASE_CONFIG && !String(window.FIREBASE_CONFIG.apiKey).startsWith("PASTE_")){
      firebase.initializeApp(window.FIREBASE_CONFIG);
      FB_DB=firebase.database();
      FB_OK=true;
    }
  }catch(e){ console.warn("Firebase init failed, using local fallback:",e); }
}

function lsGet(key,fallback){try{const v=localStorage.getItem("wc26_"+key);return v?JSON.parse(v):fallback;}catch (e2){return fallback;}}
function lsSet(key,value){try{localStorage.setItem("wc26_"+key,JSON.stringify(value));}catch (e3){}}

async function dbGet(key,fallback){
  if(FB_OK){
    try{
      const snap=await FB_DB.ref("wc26/"+key).get();
      return snap.exists()?snap.val():fallback;
    }catch(e){ return lsGet(key,fallback); }
  }
  return lsGet(key,fallback);
}
async function dbSet(key,value){
  if(FB_OK){
    try{ await FB_DB.ref("wc26/"+key).set(value); return; }catch(e){ /* fall through */ }
  }
  lsSet(key,value);
}
// Live subscription: calls cb(value) immediately and on every change.
function dbSubscribe(key,fallback,cb){
  if(FB_OK){
    const ref=FB_DB.ref("wc26/"+key);
    const handler=ref.on("value",snap=>{ cb(snap.exists()?snap.val():fallback); });
    return ()=>ref.off("value",handler);
  }else{
    cb(lsGet(key,fallback));
    return ()=>{};
  }
}

function toWestern(s){return String(s).replace(/[٠١٢٣٤٥٦٧٨٩]/g,d=>d.charCodeAt(0)-0x0660);}
// Empty score counts as 0
function norm(v){const s=toWestern(String(_nullishCoalesce(v, () => ("")))).trim();return s===""?"0":s;}
const WDAYS=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(d){const dt=new Date(d+"T00:00:00");return `${WDAYS[dt.getDay()]} ${dt.getDate()} ${MONS[dt.getMonth()]} ${dt.getFullYear()}`;}
function getGroupMatches(teams){const m=[];for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++)m.push({home:teams[i],away:teams[j]});return m;}
function getWinner(m){if(!m||m.h==null||m.h==="")return null;const h=parseInt(m.h),a=parseInt(m.a);return h>a?"home":a>h?"away":"draw";}
function calcScore(preds,actual){let s=0;for(const k in actual){const p=preds[k],ac=actual[k];if(!p||p.h==null||p.h==="")continue;if(p.h==ac.h&&p.a==ac.a)s+=3;else if(getWinner(p)===getWinner(ac))s+=1;}return s;}
function isMatchStarted(matchKey){const m=SCHEDULE.find(s=>s.key===matchKey);if(!m)return false;return new Date()>=new Date(m.date+"T"+m.kickoff+":00");}
